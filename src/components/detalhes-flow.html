<div class="org-chart">
  <div class="d-flex justify-content-end mb-2">
    <button type="button" class="btn btn-sm btn-primary" @click="openAddForm('')">
      + Adicionar unidade raiz
    </button>
  </div>

  <div class="flow-wrapper border rounded shadow-sm">
    <VueFlow
      id="org-chart-flow"
      v-model:nodes="nodes"
      v-model:edges="edges"
      :default-viewport="{ zoom: 0.8 }"
      :min-zoom="0.1"
      :max-zoom="2"
      fit-view-on-init
      @node-click="onNodeClick"
    >
      <template #node-org="{ id, data }">
        <div class="org-node" :class="{ 'org-node--selected': id === selectedId }">
          <div class="org-node__actions nodrag nopan">
            <button
              type="button"
              class="btn btn-outline-primary"
              title="Adicionar subordinada"
              @click.stop="openAddForm(id)"
            >+</button>
            <button
              type="button"
              class="btn btn-outline-secondary"
              title="Editar"
              @click.stop="openEditForm(id)"
            >✎</button>
            <button
              type="button"
              class="btn btn-outline-danger"
              title="Remover"
              @click.stop="removeNode(id)"
            >✕</button>
          </div>
          <div class="org-node__sigla">{{ data.sigla }}</div>
          <div class="org-node__nome">{{ data.nome }}</div>
          <div class="org-node__simbolo">{{ data.simbolo }}</div>

          <button
            v-if="data.childCount > 0"
            type="button"
            class="org-node__toggle nodrag nopan"
            :title="data.collapsed ? 'Expandir subordinadas' : 'Recolher subordinadas'"
            @click.stop="toggleCollapse(id)"
          >
            <span class="org-node__toggle-icon">{{ data.collapsed ? '▼' : '▲' }}</span>
            <span>{{ data.childCount }}</span>
          </button>
        </div>
      </template>

      <Background pattern-color="#aaa" :gap="16" />
      <Controls />
      <MiniMap pannable zoomable />
    </VueFlow>
  </div>

  <div class="modal fade" tabindex="-1" ref="formModal" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <form novalidate @submit.prevent="saveForm">
          <div class="modal-header">
            <h2 class="h6 modal-title mb-0">
              {{ formMode === 'add' ? 'Adicionar unidade' : 'Editar unidade' }}
            </h2>
            <button type="button" class="btn-close" aria-label="Fechar" @click="cancelForm"></button>
          </div>
          <div class="modal-body">
            <div class="row g-2">
              <div class="col-md-6">
                <label class="form-label small">Unidade pai *</label>
                <select
                  class="form-select form-select-sm"
                  :class="{ 'is-invalid': formErrors.parentId }"
                  v-model="form.parentId"
                >
                  <option value="">— (raiz)</option>
                  <option v-for="opt in parentOptions" :key="opt.id" :value="opt.id">
                    {{ opt.siglaUnidade }} — {{ opt.nomeUnidade }}
                  </option>
                </select>
                <div class="invalid-feedback">{{ formErrors.parentId }}</div>
              </div>
              <div class="col-md-6">
                <label class="form-label small">Sigla *</label>
                <input
                  type="text"
                  class="form-control form-control-sm"
                  :class="{ 'is-invalid': formErrors.siglaUnidade }"
                  v-model="form.siglaUnidade"
                />
                <div class="invalid-feedback">{{ formErrors.siglaUnidade }}</div>
              </div>
              <div class="col-md-8">
                <label class="form-label small">Nome da unidade *</label>
                <input
                  type="text"
                  class="form-control form-control-sm"
                  :class="{ 'is-invalid': formErrors.nomeUnidade }"
                  v-model="form.nomeUnidade"
                />
                <div class="invalid-feedback">{{ formErrors.nomeUnidade }}</div>
              </div>
              <div class="col-md-4">
                <label class="form-label small">Símbolo *</label>
                <input
                  type="text"
                  class="form-control form-control-sm"
                  :class="{ 'is-invalid': formErrors.simboloQuantidadeCargos }"
                  v-model="form.simboloQuantidadeCargos"
                />
                <div class="invalid-feedback">{{ formErrors.simboloQuantidadeCargos }}</div>
              </div>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-sm btn-outline-secondary" @click="cancelForm">Cancelar</button>
            <button type="submit" class="btn btn-sm btn-primary">Salvar</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
