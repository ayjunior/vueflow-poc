<div class="org-chart">
  <div class="flow-wrapper border rounded shadow-sm">
    <VueFlow
      id="org-chart-flow"
      v-model:nodes="nodes"
      v-model:edges="edges"
      :default-viewport="{ zoom: 0.8 }"
      :min-zoom="0.1"
      :max-zoom="2"
      fit-view-on-init
      :delete-key-code="null"
      only-render-visible-elements
      @node-click="onNodeClick"
    >
      <template #node-org="{ id, data }">
        <div class="org-node" :class="{ 'org-node--selected': id === selectedId }">
          <div class="org-node__sigla">{{ data.sigla }}</div>
          <div class="org-node__nome">{{ data.nome }}</div>
          <div class="org-node__simbolo">{{ data.simbolo }}</div>

          <button
            v-if="data.childCount > 0"
            type="button"
            class="org-node__toggle nodrag nopan"
            :title="data.collapsed ? 'Expandir subordinadas' : 'Recolher subordinadas'"
            @click.stop="toggleCollapse(id)"
          >
            <span class="org-node__toggle-icon">{{ data.collapsed ? '▼' : '▲' }}</span>
            <span>{{ data.childCount }}</span>
          </button>
        </div>
      </template>

      <Background pattern-color="#aaa" :gap="16" />
      <Controls />
      <MiniMap pannable zoomable />
    </VueFlow>
  </div>
</div>
